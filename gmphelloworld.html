<!DOCTYPE html>
<html>
  <head>
    <title>Simple Map</title>
    <meta name="viewport" content="initial-scale=1.0">
    <meta charset="utf-8">
    <style>
      /* Always set the map height explicitly to define the size of the div
       * element that contains the map. 
       * NOTE: This is an often forgot item!!!
       */
      #mapid {
        height: 100%;
      }
      
      /* Optional: Makes the sample page fill the window. */
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
      }
    </style>
  </head>
  <body>
    <div id="mapid"></div>
    <script>
      var map;
      function initMap() {
        map = new google.maps.Map(document.getElementById('mapid'), {
          center: {lat: -34.397, lng: 150.644},
          zoom: 8
        });
      }
    </script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBoQrAzKGZ_prpM5rHXY3AwehpLZ0qhT2k&callback=initMap"
    async defer></script>
  </body>
</html>
